<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>dome test pattern — testbild-360</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111; color: #fff;
      font-family: ui-monospace, Menlo, monospace;
      display: flex; min-height: 100vh;
    }
    #stage {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
      overflow: hidden;
    }
    #preview {
      width: min(100vh, calc(100vw - 280px)); height: min(100vh, calc(100vw - 280px));
      max-width: calc(100vh - 2rem); max-height: calc(100vh - 2rem);
      background: #000;
      image-rendering: auto;
    }
    #panel {
      width: 260px;
      background: #0a0a0a;
      border-left: 1px solid #222;
      padding: 1.5rem 1.25rem;
      display: flex; flex-direction: column; gap: 1.25rem;
      font-size: 0.82rem;
    }
    #panel h1 { font-size: 0.85rem; font-weight: normal; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; }
    #panel a.back { color: #888; text-decoration: none; font-size: 0.75rem; }
    #panel a.back:hover { color: #fff; }
    .group { display: flex; flex-direction: column; gap: 0.4rem; }
    .group label { font-size: 0.72rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; }
    select, button {
      background: #000; color: #fff; border: 1px solid #333;
      padding: 0.5rem 0.6rem; font: inherit; font-size: 0.82rem;
      cursor: pointer;
    }
    select:hover, button:hover { border-color: #666; }
    button.primary { background: #fff; color: #000; border-color: #fff; }
    button.primary:hover { background: #eee; }
    .row { display: flex; align-items: center; gap: 0.5rem; }
    .row input[type="checkbox"] { accent-color: #fff; }
    .hint { font-size: 0.7rem; opacity: 0.45; line-height: 1.5; }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="preview"></canvas>
  </div>
  <aside id="panel">
    <div>
      <a class="back" href="index.html">← testbild-360</a>
      <h1 style="margin-top: 0.5rem">dome test pattern</h1>
    </div>

    <div class="group">
      <label>output resolution</label>
      <select id="res">
        <option value="1024">1024 × 1024</option>
        <option value="2048" selected>2048 × 2048</option>
        <option value="4096">4096 × 4096</option>
        <option value="8192">8192 × 8192</option>
      </select>
    </div>

    <div class="group">
      <label>fov (fisheye aperture)</label>
      <select id="fov">
        <option value="180" selected>180° (full hemisphere)</option>
        <option value="220">220° (domemaster)</option>
      </select>
    </div>

    <div class="group">
      <label>overlays</label>
      <div class="row"><input type="checkbox" id="sweet" checked><label for="sweet" style="text-transform:none; opacity:1">sweet-spot band (30–45°)</label></div>
      <div class="row"><input type="checkbox" id="ramp" checked><label for="ramp" style="text-transform:none; opacity:1">greyscale ramp</label></div>
      <div class="row"><input type="checkbox" id="points" checked><label for="points" style="text-transform:none; opacity:1">point spreads</label></div>
      <div class="row"><input type="checkbox" id="labels" checked><label for="labels" style="text-transform:none; opacity:1">labels</label></div>
    </div>

    <div class="group">
      <button class="primary" id="download">download png</button>
      <button id="rerender">re-render</button>
    </div>

    <p class="hint">
      Azimuthal equidistant mapping (r = f·θ). 0° azimuth at bottom (audience-front).
      Elevation measured from horizon: 0° = edge, 90° = zenith. Sweet-spot band marks the
      30–45° zone recommended for dome text placement.
    </p>
  </aside>

  <script>
    const canvas = document.getElementById('preview');
    const ctx = canvas.getContext('2d');

    const $ = id => document.getElementById(id);
    const controls = ['res', 'fov', 'sweet', 'ramp', 'points', 'labels'];
    controls.forEach(id => $(id).addEventListener('change', render));
    $('rerender').addEventListener('click', render);
    $('download').addEventListener('click', download);

    function render() {
      const size = parseInt($('res').value, 10);
      const fov  = parseInt($('fov').value, 10);
      canvas.width = size;
      canvas.height = size;

      const cx = size / 2, cy = size / 2;
      const R = size / 2 * 0.985;            // dome disc radius (small margin)
      const lineUnit = Math.max(1, Math.round(size / 1024));

      // ── background ─────────────────────────────────────────────────────────
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, size, size);

      // Azimuthal equidistant: elevation E (from horizon) → r/R = (90 - E) / (fov/2)
      // For 180° dome, fov/2 = 90 so r/R = (90 - E)/90.
      // For 220° (domemaster) the disc extends 20° below horizon; horizon sits at r/R = 90/110.
      const halfFov = fov / 2;                // degrees from zenith at the disc edge
      const elevToR = E => ((halfFov - (90 - (90 - E))) ) / halfFov * R;
      // Simpler: zenith angle z = 90 - E, r = z / halfFov * R
      const zToR = z => (z / halfFov) * R;

      // ── sweet-spot band (under the grid so grid reads on top) ──────────────
      if ($('sweet').checked) {
        const rInner = zToR(90 - 45);   // 45° elevation
        const rOuter = zToR(90 - 30);   // 30° elevation
        ctx.fillStyle = 'rgba(80, 180, 255, 0.08)';
        ctx.beginPath();
        ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
        ctx.arc(cx, cy, rInner, 0, Math.PI * 2, true);
        ctx.fill();

        // 30° elevation sweet-spot ring (dashed, cyan)
        ctx.strokeStyle = 'rgba(80, 180, 255, 0.85)';
        ctx.lineWidth = lineUnit * 1.5;
        ctx.setLineDash([lineUnit * 6, lineUnit * 4]);
        ctx.beginPath();
        ctx.arc(cx, cy, zToR(60), 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // ── elevation rings ────────────────────────────────────────────────────
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = lineUnit;
      // minor rings every 5° elevation
      for (let E = 0; E <= 90; E += 5) {
        const z = 90 - E;
        if (z > halfFov) continue;
        const r = zToR(z);
        ctx.globalAlpha = (E % 10 === 0) ? 0.9 : 0.35;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // ── azimuth spokes ─────────────────────────────────────────────────────
      // Azimuth A: 0° at bottom of image, increasing CCW on screen
      // Screen angle = 90° + A  (measuring from +x axis CCW in math; but canvas y is flipped)
      // Convert: point at (cx + R sin(A), cy + R cos(A)) gives 0° at bottom.
      const azToXY = (rr, Adeg) => {
        const a = Adeg * Math.PI / 180;
        return [cx + rr * Math.sin(a), cy + rr * Math.cos(a)];
      };
      for (let A = 0; A < 360; A += 5) {
        ctx.globalAlpha = (A % 10 === 0) ? 0.9 : 0.35;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        const [x, y] = azToXY(R, A);
        ctx.lineTo(x, y);
        ctx.stroke();
      }
      // fine ticks every 1° on outer ring
      ctx.globalAlpha = 0.6;
      for (let A = 0; A < 360; A += 1) {
        if (A % 5 === 0) continue;
        const [x1, y1] = azToXY(R, A);
        const [x2, y2] = azToXY(R - lineUnit * 6, A);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // ── outer horizon ring (bolder) ────────────────────────────────────────
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = lineUnit * 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R, 0, Math.PI * 2);
      ctx.stroke();

      // ── center dot (zenith) ────────────────────────────────────────────────
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(cx, cy, lineUnit * 1.5, 0, Math.PI * 2);
      ctx.fill();

      // ── labels ─────────────────────────────────────────────────────────────
      if ($('labels').checked) {
        const baseFont = Math.max(10, Math.round(size / 120));
        ctx.fillStyle = '#fff';
        ctx.font = `${baseFont}px ui-monospace, Menlo, monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Elevation labels on the 4 cardinal axes — readable from inside the dome
        // (i.e. tangent to the radius, always right-side up when viewed from that direction).
        const cardinals = [
          { A: 0,   rot: 0 },          // bottom
          { A: 90,  rot: Math.PI / 2 },// right
          { A: 180, rot: Math.PI },    // top
          { A: 270, rot: -Math.PI / 2 } // left
        ];
        for (const { A, rot } of cardinals) {
          for (let E = 10; E < 90; E += 10) {
            const [x, y] = azToXY(zToR(90 - E), A);
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(-baseFont * 0.9, -baseFont * 0.6, baseFont * 1.8, baseFont * 1.2);
            ctx.fillStyle = '#fff';
            ctx.fillText(String(E), 0, 0);
            ctx.restore();
          }
        }

        // Azimuth labels every 10° around the outer ring
        const labelR = R + baseFont * 1.2;
        for (let A = 0; A < 360; A += 10) {
          const [x, y] = azToXY(labelR, A);
          ctx.save();
          ctx.translate(x, y);
          // rotate so label reads outward
          ctx.rotate(A * Math.PI / 180);
          ctx.fillText(String(A), 0, 0);
          ctx.restore();
        }
      }

      // ── greyscale ramp (255 steps) ─────────────────────────────────────────
      if ($('ramp').checked) {
        // place a 255-step ramp as a radial strip at azimuth 45° (between cardinals)
        const rampA = 45;
        const rampInnerR = zToR(80);  // near zenith
        const rampOuterR = zToR(10);  // near horizon
        const rampWidth = size * 0.025;
        const steps = 256;
        for (let i = 0; i < steps; i++) {
          const t = i / (steps - 1);
          const rr = rampInnerR + (rampOuterR - rampInnerR) * t;
          const rrNext = rampInnerR + (rampOuterR - rampInnerR) * ((i + 1) / (steps - 1));
          const [x1, y1] = azToXY(rr, rampA);
          const a = rampA * Math.PI / 180;
          // perpendicular direction for the strip's width
          const perpX = Math.cos(a), perpY = -Math.sin(a);
          const v = Math.round(t * 255);
          ctx.fillStyle = `rgb(${v},${v},${v})`;
          ctx.beginPath();
          ctx.moveTo(x1 - perpX * rampWidth / 2, y1 - perpY * rampWidth / 2);
          ctx.lineTo(x1 + perpX * rampWidth / 2, y1 + perpY * rampWidth / 2);
          const [x2, y2] = azToXY(rrNext, rampA);
          ctx.lineTo(x2 + perpX * rampWidth / 2, y2 + perpY * rampWidth / 2);
          ctx.lineTo(x2 - perpX * rampWidth / 2, y2 - perpY * rampWidth / 2);
          ctx.closePath();
          ctx.fill();
        }
      }

      // ── point spreads (1-4 px) ─────────────────────────────────────────────
      if ($('points').checked) {
        // four point clusters at azimuth 135°, 225°, 315° (skip 45° — ramp is there)
        const clusterAz = [135, 225, 315];
        const clusterR = zToR(30);  // 60° elevation ring
        ctx.fillStyle = '#fff';
        for (const A of clusterAz) {
          const [cx0, cy0] = azToXY(clusterR, A);
          // 1,2,3,4 px square dots in a row, spaced 12 px apart (at 1024)
          const spacing = size / 85;
          for (let p = 1; p <= 4; p++) {
            const px = cx0 + (p - 2.5) * spacing;
            const py = cy0;
            ctx.fillRect(px - p / 2, py - p / 2, p, p);
          }
        }
      }

      // ── legend / signature (bottom-center, outside grid) ───────────────────
      if ($('labels').checked) {
        const sigFont = Math.max(10, Math.round(size / 140));
        ctx.font = `${sigFont}px ui-monospace, Menlo, monospace`;
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillText(
          `testbild-360  ·  ${size}×${size}  ·  fov ${fov}°  ·  azimuthal equidistant`,
          cx, size - sigFont * 0.6
        );
      }
    }

    function download() {
      render();
      const size = $('res').value;
      const fov = $('fov').value;
      const link = document.createElement('a');
      link.download = `dome-testpattern-${size}-fov${fov}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    render();
  </script>
</body>
</html>
