<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testbild 360</title>
  <style>
    @font-face { font-family: 'OffBit'; src: url('fonts/OffBit-Regular.woff2') format('woff2'); font-weight: normal; }
    @font-face { font-family: 'OffBit'; src: url('fonts/OffBit-Bold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'OffBit-101'; src: url('fonts/OffBit-101.woff2') format('woff2'); font-weight: normal; }
    @font-face { font-family: 'OffBit-101'; src: url('fonts/OffBit-101Bold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'OffBit-Dot'; src: url('fonts/OffBit-Dot.woff2') format('woff2'); font-weight: normal; }
    @font-face { font-family: 'OffBit-Dot'; src: url('fonts/OffBit-DotBold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'OffBit-Bar'; src: url('fonts/OffBit-Bar.woff2') format('woff2'); font-weight: normal; }
    @font-face { font-family: 'OffBit-Bar'; src: url('fonts/OffBit-BarBold.woff2') format('woff2'); font-weight: bold; }
    @font-face { font-family: 'OPSPastPerfect'; src: url('fonts/OPSPastPerfect-Regular.woff2') format('woff2'); font-weight: normal; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background-color: #1a1a1a;
      background-image:
        linear-gradient(45deg, #222 25%, transparent 25%),
        linear-gradient(-45deg, #222 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #222 75%),
        linear-gradient(-45deg, transparent 75%, #222 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, 10px 0;
    }
    canvas {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script type="module" src="testcard.js"></script>
</body>
</html>
